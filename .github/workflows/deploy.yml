name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends cpanminus vim

      - name: Install Perl modules
        run: |
          sudo cpanm --notest \
            HTML::TreeBuilder \
            IPC::System::Simple \
            Path::Class \
            Pod::Elemental \
            Pod::Elemental::Transformer::Codebox \
            Pod::Elemental::Transformer::List \
            Pod::Elemental::Transformer::PPIHTML \
            Pod::Elemental::Transformer::SynMux \
            Pod::Elemental::Transformer::VimHTML \
            Pod::CYOA::Transformer

      - name: Build site
        run: ./bin/build-site

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
